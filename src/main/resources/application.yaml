spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        user-bans-channel: "user-bans"
        calculations_channel:
          name: calculations_channel

server:
  port: 8081

ad:
  batch:
    size: 10

webspell:
  api:
    url: "https://webspellchecker-webspellcheckernet.p.rapidapi.com/api"
    content-type: "application/json"
    key: "348d2925famsh95c7436e81d45c0p1eeb4ajsn1347b2ce620a"
    host: "webspellchecker-webspellcheckernet.p.rapidapi.com"

scheduler:
  post-correction:
    cron: "0 0 2 * * *"

logging:
  level:
    root: info

user-service:
  host: localhost
  port: 8080
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080

s3:
  endpoint: http://127.0.0.1:9000
  access-key: user
  secret-key: password
  bucket-name: corpbucket
  region: us-east-1

file-upload:
  post:
    min-amount: 1
    max-amount: 10
    info-by-file-type:
      image:
        max-size: 5242880
        allowed-extensions:
          - jpg
          - jpeg
          - png
      video:
        max-size: 10485760
        allowed-extensions:
          - mp4
          - mkv
          - avi
          - mov
          - quicktime
      audio:
        max-size: 5242880
        allowed-extensions:
          - mp3
          - wav
          - ogg
          - mpeg
      another:
        max-size: 0
        allowed-extensions: [ ]
    image-size-limits:
      square:
        max-length: 1080
      rectangular:
        max-long-side-length: 1080
        max-short-side-length: 566
