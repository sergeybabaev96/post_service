spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      post-ttl-hours: 24
      clear-cache:
        cron: 0 0 * * * *
      post-ttl-key: "post-id-ttl"
      post-id-key: "post-id"
      channels:
        calculations_channel:
          name: calculations_channel

  kafka:
    bootstrap:
      server:
        address: localhost:9092
    topics:
      analytic-topics:
        add-like-topic-name: "user-like-post"
        post-view-topic: user-post-viewed

  services:
    s3:
     endpoint: http://127.0.0.1:9000
     region: US_EAST_1
     accessKey: user
     secretKey: password
     bucketName: corpbucket

  servlet:
    multipart:
      max-request-size: 100MB
      max-file-size: 10MB

server:
  port: 8081

logging:
  level:
    root: info

user-service:
  host: localhost
  port: 8080
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080

springdoc:
  api-docs:
    path: /v3/post-service-api-docs
  swagger-ui:
    path: /post-service-ui.html

cron:
  comments:
    check-delay: 0 * * * * *

comment:
  check:
    size: 100

post:
  publisher:
    scheduler:
      cron: "0 0/1 * 1/1 * ?" # every minute
  ad-remover:
    scheduler:
      cron: "0 0/1 * 1/1 * ?" # every minute
  max-images-per-post: 10
  subscribers:
    chunk-size: 100

resources:
  file:
    max-file-size: 5242880
  image:
    max-width-horizontal: 1080 # px
    max-height-horizontal: 566
    max-size-square: 1080
    supported-image-types: "image/png,image/jpeg,image/jpg"
  cleanup:
    scheduler:
      cron: "0 0 6 * * ?" # every day
    retention-period: 1M # period: M - month, D - day

post-service:
  publish:
    scheduled:
      cron: "0 * * * * *"
    batch-size: 1000
    thread-amount: 10
  post-created:
    executor:
      core-pool-size: 4
      max-pool-size: 10
      queue-capacity: 100

kafka:
  bootstrap-servers: localhost:9092
  topic:
    comment: user-comment-post
    post: user-create-post
  consumer:
    group-id: "post-group"
    retry-interval-ms: 5000
    max-attempts: 5

feed:
  key: feed
  post:
    max-size: 500

news-feed:
  keys:
    user: user
    feed: feed
    post: posts
  ttl: 600