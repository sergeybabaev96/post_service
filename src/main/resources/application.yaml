spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel

  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8081

logging:
  level:
    root: info

user-service:
  url: localhost:8080/api/v1
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080

domain:
  path: /api/v1

redis:
  cache:
    ttl-minutes: 1

hashtags:
  limit: 5

author:
  ban:
    cron: "0 0 0 * * *" # every day at midnight

user:
  ban:
    redis:
      channel: user_ban

post:
  unverified:
    max: 5

service:
  name: post-service

kafka:
  album:
    created:
      topic: created-album