spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  mvc:
    servlet:
      path: /api/v1

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel
        user-ban-channel:
          name: user_ban
        comment-channel: comment_channel
        like-event-channel: like_event

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: group_id
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: faang.school.postservice.dto.post
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    topic:
      post:
        name: posts
        partitions: 10
        replicas: 1


  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 50MB



server:
  port: 8081

  tomcat:
    max-swallow-size: 5MB

thread-pool:
  max-threads: 10
  feed:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100



retry:
  max-attempts: 3           # Количество попыток
  backoff-multiplier: 2.0   # Множитель для экспоненциальной задержки


post_service:
  batch_size: 1000

logging:
  level:
    root: info
    #org.springframework.kafka: DEBUG
    #org.apache.kafka.clients.consumer: DEBUG

user-service:
  host: localhost
  port: 8080
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080
ad-service:
  ad-removal:
    batch-size: 10
    cron: "0 0 0 * * ?"
    #Каждый день в 00:00
like-service:
  batch-size: 100

aws:
  url: http://localhost:9000
  user: user
  password: password
  bucketName: commentbucket
app:
  posts:
    files:
      max-file-size: 5242880
      max-post-files-count: 10
      image-max-width: 1080
      image-max-height: 566

services:
  s3:
    endpoint: http://127.0.0.1:9000
    accessKey: user
    secretKey: password
    bucketName: corpbucket
  user-service:
    host: localhost
    port: 8080
  project-service:
    host: localhost
    port: 8082
  payment-service:
    host: localhost
    port: 9081

image:
  smallImageSize: 170
  largeImageSize: 1080


comment:
  path-to-dictionary: /bad_words_list.txt

  schedule:
    verify: "* * */10 * * * "
    user-ban: "* * */30 * * *"
  batchSize: 100
  thread-pool-size: 4
  word-split-regex: "(?<=\\p{L})(?=\\p{P})|(?<=\\p{P})(?=\\p{L})|\\s+"
  number-bad-comments: 5


cache:
  author-ttl: 86400
  post-ttl: 86400
  post:
    prefix: "posts:"
    fields:
      views: numberOfViews
      number-of-likes: numberOfLikes
  author:
    prefix: "author:"
  heat:
    producer-batch-size: 1000
    process-batch-size: 100
    max-posts: 500
    max-days-back: 60

post-comments:
  size: 3

feed-posts:
  size: 500