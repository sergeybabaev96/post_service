spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "faang.school.postservice.event"

    kafka:
      bootstrap-servers: localhost:9092
      topic:
        like-events: "like-events"
      partitions: 3
      replicas: 1

server:
  port: 8081

logging:
  level:
    root: info

project-protocol: http
user-service:
  host: localhost
  port: 8080
  endpoints:
    getById: /api/v1/users/{id}
project-service:
  host: localhost
  port: 8082
  endpoints:
    getById: /api/v1/projects/{id}
payment-service:
  host: localhost
  port: 9080

api:
    title: "Post service API"
    version: "0.1.0.1"
    description: "Post service gives the ability to write text posts to share your thoughts, knowledge and information with other users."

aws:
  s3:
    endpoint: http://127.0.0.1:9000
    accessKey: user
    secretKey: password
    bucket: corpbucket
    region: us-east-1
    maxConcurrency: 50
    connectionTimeout: 60s
    readTimeout: 60s
    writeTimeout: 60s
    apiCallTimeout: 2m
    apiCallAttemptTimeout: 90s

rest-template:
  config:
    connectTimeout: 5000
    readTimeout: 5000

file-controller:
  upload:
    max-files-per-post: 10
    max-files-size-in-post-mb: 5
  image:
    max-width: 1080
    max-height-rectangle: 566