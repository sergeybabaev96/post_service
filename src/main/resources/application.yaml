spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel

    kafka:
      bootstrap-servers: localhost:9092
      follower-ids-batch-size: 10
      topics:
        posts:
          name: posts-topic
          partitions: 3
          replicas: 1

  servlet:
    multipart:
      max-file-size: 52428800
      max-request-size: 52428800

image-for-post:
  max-horizontal-width: 1080
  max-horizontal-height: 566
  max-square-dimensions: 1080
  max-image-size: 5242880
  output-quality: 0.7
  bucket-name: post-bucket
  folder-name: image-for-post

services:
 s3:
   endpoint: http://localhost:9000
   accessKey: user
   secretKey: password

server:
  port: 8081

logging:
  level:
    root: info
    org.zalando.logbook: TRACE

like:
  batch: 100

user-service:
  host: localhost
  port: 8080
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080

scheduling:
  cron: "0 0 0 * * ?"
  cronExpression: "0 0 12 * * ?"
  initialDelay: 30000
  fixedRate: 30000
thread-pool:
  core-size: 3
  max-size: 5
  queue-capacity: 10
batch:
  size: 2