spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/post-service
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  kafka:
    bootstrap-servers: "localhost:9092"
    pool-size: 3

    consumer:
      group-id: "group"
      auto-offset-reset: earliest
      deserializer-trusted-packages: "java.util,java.lang,faang.school.postservice.event"

    producer:
      acks: 1
      retries: 3

    topics:
      PostViewEvent:
        name: post_views
        num-partitions: 6
        replication-factor: 3
      PostEvent:
        name: posts
        num-partitions: 6
        replication-factor: 3
      CommentEvent:
        name: comments
        num-partitions: 6
        replication-factor: 3
      LikeEvent:
        name: likes
        num-partitions: 6
        replication-factor: 3

  cache:
    type: redis
    time-to-live: 86400

  data:
    redis:
      port: 6379
      host: localhost

      feed-cache:
        batch-size: 20
        max-feed-size: 500
        key: "feed:"
        number-of-users-on-page: 3
        default-post-id: 1

      post-cache:
        comments-in-post: 3

      channels:
        calculations: calculations_channel
        comment_create: comment_create_channel
        likes: likes_channel

      redisson-client:
        name-version: version
        key-for-version: versionedKey
        start-num-for-version: 1
        lock-cache-post: "lock:cachePost:"

      zset:
        range:
          remove:
           start:
            index: 0
           end:
            index: 0
          offset:
            index: 1

  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5_000
            readTimeout: 10_000

resilience4j:
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 5s
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
  circuitbreaker:
    instances:
      default:
        sliding-window-type: count_based
        sliding-window-size: 5
        failure-rate-threshold: 75
        minimum-number-of-calls: 5
        max-wait-duration-in-half-open-state: 10s
        wait-duration-in-open-state: 10s
        automatic-transition-from-open-to-half-open-enabled: true
        permitted-number-of-calls-in-half-open-state: 2
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException


server:
  port: 8081
  servlet:
    context-path: /posts/api

logging:
  level:
    root: info

post:
  moderation:
    batch-size: 10
    page-size: 20
    cronPeriod: "0 0 0 * * *"
  schedule:
    batch-size: 1000
    page-size: 20
    scheduled-cron: "0 * * * * *"
    max-retries: 5
    timeout: 10
    initial-delay: 500
    delay-multiplier: 2
    batchCount: 3
  upload:
    max-files: 10
    max-file-size-mb: 5
  grammar:
    cronPeriod: "0 0 0 * * *"
    batch-size: 20
    page-size: 20

cover:
  max-image-size: 5242880
  max-image-width: 1080
  max-image-height-horizontal: 566

services:
  s3:
    endpoint: http://localhost:9000
    accessKey: user
    secretKey: password
    bucketName: postbucket
    max_image_size: 5

user-service:
  host: localhost
  port: 8080
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080

ad:
  schedule:
    removal-cron: "0 0 12 * * ?"
  batch:
    size: 1000

task:
  execution:
    pool:
      core-size: 24
      max-size: 48
      keep-alive: 60

---

spring:
  config:
    activate:
      on-profile: local

logging:
  level:
    root: info

---

spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: info
