spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      topics:
        publishedPost: published_post_topic
        likedPost: liked_post_topic

server:
  port: 8081

user-service:
  host: localhost
  port: 8080

project-service:
  host: localhost
  port: 8082

payment-service:
  host: localhost
  port: 9080

yandex-speller:
  url: https://speller.yandex.net

cron:
  correct_post: "0 0 0 * * *" # ежедневно в 00:00

scheduled:
  publish-cron: "0 * * * * *" # запускаем каждую минуту

postservice:
  thread-pool:
    size: 10