spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel
        user-ban-channel:
          name: user_ban
        comment-channel: comment_channel
        like-event-channel: like_event
      cache:
        feedMaxSize: 500
        pageSize: 20
        ttl: 86400

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: true
    topics:
      post:
        name: post
        partitions: 3
        replicas: 1
      delete-post:
        name: delete-post
        partitions: 3
        replicas: 1
    producer:
      retries: 3
      retry-backoff-ms: 1000
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: 'faang.school.postservice.dto.feed'
      groups:
        post: postGroup
    listener:
      ack-mode: MANUAL
      retry-attempts: 3
      retry-interval: 1000

  mvc:
    servlet:
      path: /api/v1

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8081
  tomcat:
    max-swallow-size: 5MB

thread_pool:
  max_threads: 10

post_service:
  batch_size: 1000

logging:
  level:
    root: info

user-service:
  host: localhost
  port: 8080
  version: /api/v1
project-service:
  host: localhost
  port: 8082
  version: /api/v1
payment-service:
  host: localhost
  port: 9080
ad-service:
  ad-removal:
    batch-size: 10
    cron: "0 0 0 * * ?"
    #Каждый день в 00:00
like-service:
  batch-size: 100

aws:
  url: http://localhost:9000
  user: user
  password: password
  bucketName: commentbucket

image:
  smallImageSize: 170
  largeImageSize: 1080


comment:
  path-to-dictionary: /bad_words_list.txt

  schedule:
    verify: "0 0 0 * * ?"
    #"*/10 * * * * *"
    user-ban: "0 0 0 * * ?"
    #"*/30 * * * * *"
  batchSize: 100
  thread-pool-size: 4
  word-split-regex: "(?<=\\p{L})(?=\\p{P})|(?<=\\p{P})(?=\\p{L})|\\s+"
  number-bad-comments: 5

retry:
  maxAttempts: 3
  backoff:
    delay: 1000
    multiplier: 2.0

feed:
  kafka:
    subscribers-batch-size: 1000
    post-topic: post

feign:
  client:
    config:
      default:
        retryer:
          enabled: true
          period: 1000
          maxPeriod: 2000
          maxAttempts: 3

