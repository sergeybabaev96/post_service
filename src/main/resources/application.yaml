spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password
  messages:
    basename: messages
    encoding: UTF-8

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel

server:
  port: 8081

logging:
  level:
    root: info

user-service:
  host: localhost
  port: 8080
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080


perspective-api:
  key: "AIzaSyDSLgf8qagfMyfjnvfxAVOmpgGLkNfWB-Y"
  url: "https://commentanalyzer.googleapis.com/v1alpha1/comments:analyze"

moderation:
  threads: 20
  job:
    cron: "0 0 15 * * ?"
  batch:
    size: 1000
  retry:
    delay: "1000"
    multiplier: "2"
    max-attempts: "3"

