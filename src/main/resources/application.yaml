spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel
        user-ban-channel:
          name: user_ban
        comment-channel: comment_channel
        like-event-channel: like_event

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 50MB

server:
  port: 8081
  servlet:
    context-path: /api/v1

  tomcat:
    max-swallow-size: 5MB

thread_pool:
  max_threads: 10

post_service:
  batch_size: 1000

logging:
  level:
    root: info

user-service:
  host: localhost
  port: 8080
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080
ad-service:
  ad-removal:
    batch-size: 10
    cron: "0 0 0 * * ?"
    #Каждый день в 00:00
like-service:
  batch-size: 100

aws:
  url: http://localhost:9000
  user: user
  password: password
  bucketName: commentbucket
app:
  posts:
    files:
      max-file-size: 5242880
      max-post-files-count: 10
      image-max-width: 1080
      image-max-height: 566

services:
  s3:
    endpoint: http://127.0.0.1:9000
    accessKey: user
    secretKey: password
    bucketName: corpbucket
  user-service:
    host: localhost
    port: 8080
  project-service:
    host: localhost
    port: 8082
  payment-service:
    host: localhost
    port: 9081

image:
  smallImageSize: 170
  largeImageSize: 1080


comment:
  path-to-dictionary: /bad_words_list.txt

  schedule:
    verify: "*/10 * * * * *"
    user-ban: "*/30 * * * * *"
  batchSize: 100
  thread-pool-size: 4
  word-split-regex: "(?<=\\p{L})(?=\\p{P})|(?<=\\p{P})(?=\\p{L})|\\s+"
  number-bad-comments: 5
