spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel
        user-ban-channel:
          name: user_ban
        comment-channel: comment_channel
        like-event-channel: like_event
      cache:
        ttl-minutes: 10
        user-ttl-minutes: 1440
        post-ttl-minutes: 1440
        comment-ttl-minutes: 1440
        user-cache-name: user
        post-cache-name: post
        comment-cache-name: comment

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      group-id: newsfeed2
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "faang.school.postservice.dto.post"  # Пакет с DTO
        #spring.json.value.default.type: ""
        #spring.json.use.type.headers: true  # Использовать информацию о типе из заголовков
        spring.json.type.mapping: >
          commentEvent:faang.school.postservice.dto.post.PostCommentEvent,
          postEvent:faang.school.postservice.dto.post.PostPublicationEvent,
          postProcessEvent:faang.school.postservice.dto.post.PostProcessEvent,
          likeEvent:faang.school.postservice.dto.post.PostLikeEvent,
          viewEvent:faang.school.postservice.dto.post.PostViewEvent
    listener:
      ack-mode: manual
      retry-attempts: 3 # Количество попыток повтора
      retry-interval: 1000 # Интервал между попытками
      #default-retryable: false # Отправка в DLQ после неудачных попыток
    topic:
      posts-topic: posts2
      posts-process-topic: posts_process2
      post-views-topic: post_views2
      post-likes-topic: post_likes2
      post-comments-topic: post_comments2

  mvc:
    servlet:
      path: /api/v1

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  async:
    core-pool-size: 5
    max-pool-size: 20
    queue-capacity: 30
    thread-name-prefix: AsyncThread-

server:
  port: 8081
  tomcat:
    max-swallow-size: 5MB

thread_pool:
  max_threads: 10

post_service:
  batch_size: 1000

logging:
  level:
    root: info
    feign: debug

user-service:
  host: localhost
  port: 8080
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080
ad-service:
  ad-removal:
    batch-size: 10
    cron: "0 0 0 * * ?"
    #Каждый день в 00:00
like-service:
  batch-size: 100

aws:
  url: http://localhost:9000
  user: user
  password: password
  bucketName: commentbucket

image:
  smallImageSize: 170
  largeImageSize: 1080


comment:
  path-to-dictionary: /bad_words_list.txt

  schedule:
    verify: "* */10 * * * *"    #каждые 10 сек // временно сделал каждые 10 минут
    user-ban: "* */30 * * * *"  #каждые 10 сек // временно сделал каждые 30 минут
  batchSize: 100
  thread-pool-size: 4
  word-split-regex: "(?<=\\p{L})(?=\\p{P})|(?<=\\p{P})(?=\\p{L})|\\s+"
  number-bad-comments: 5

newsfeed:
  prefix: newsfeed11
  max-posts: 10 # Max posts per feed
  page-size: 5  # posts for feed page
  batch-size: 2 # followers batch size for processing
  comments-number: 3 # Number of comments in feed post