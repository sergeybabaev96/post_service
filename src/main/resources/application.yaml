spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel

server:
  port: 8081

logging:
  level:
    root: info

feign:
  client:
    config:
      default:
        connectTimeout: 15000
        readTimeout: 15000
        loggerLevel: BASIC
domain:
  base-path: /api/v1

post-service:
  ai:
    grammar-prompt: "Проверь текст на орфографию, если есть ошибка или ошибки верни только исправленный текст."
    api-key: ""
    base-url: "https://api.openai.com"
    chat-uri: "/v1/chat/completions"
    model: "gpt-4o-mini"
  jobs:
    post-corrector:
      cron: 0 0 12 * * *
      batch-count: 100
user-service:
  url: localhost:8080/api/v1
project-service:
  url: localhost:8082/api/v1
payment-service:
  url: localhost:9080