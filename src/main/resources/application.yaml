spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  servlet:
    multipart:
      max-file-size: 5MB

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel
  kafka:
    topics:
      comment_create: comment-create
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      enable-idempotence: true
      max-in-flight-requests-per-connection: 5

expired:
  ad:
    remover:
      cron: "0 0 0 * * *"
      batch_size: 100

server:
  port: 8081

rewriter:
  api: https://tinq.ai/api/v2/rewrite
  token: n41OhVC8oftZs1pl2B62fajVwluSm5g11SwIDbMW1c76c966

logging:
  level:
    root: info

moderation:
  dictionary: classpath:obscene_words.txt

user-service:
  host: localhost
  port: 8080
  api-prefix: api/v1
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080
minio:
  url: "${MINIO_URL:http://localhost:9000}"
  user: ${MINIO_USER:user}
  password: ${MINIO_PASSWORD:password}