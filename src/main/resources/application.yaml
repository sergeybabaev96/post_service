app:
  hashtags:
    max-cached-posts-per-hashtag: 100
    thread-pool-size: 8
    top-hashtags-cache: 1000

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel
  retry:
    language-tool:
      max-attempts: 4
      backoff-delay: 500

server:
  port: 8081

logging:
  level:
    root: info

user-service:
  host: localhost
  port: 8080
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080

servers:
  language-tool:
    base-url: https://api.languagetool.org/v2

posts:
  correction:
    cron: "0 5 * * * *"
    batch-size: 100000
    thread-poop-size: 16
