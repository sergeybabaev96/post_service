spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: post-service

server:
  port: 8081

logging:
  level:
    root: info

user-service:
  url: localhost:8080/api/v1
project-service:
  host: localhost
  port: 8082
payment-service:
  host: localhost
  port: 9080

domain:
  path: /api/v1

redis:
  cache:
    hashtag-ttl: 1 #minutes
    post-ttl: 1 # days
    authors-ttl: 1 # days

hashtags:
  limit: 5

author:
  ban:
    cron: "0 0 0 * * *" # every day at midnight

user:
  ban:
    redis:
      channel: user_ban

post:
  unverified:
    max: 5

service:
  name: post-service

ad:
  delete:
    count: 1000
  expired:
    cron: "0 0 0 * * *" # every day at midnight

kafka:

  group:
    id: post-service

  message:
    send:
      max-attempts: 3
      interval: 30000 # 30 sec

  album:
    created:
      topic: created-album

  comment:
    topic: comment_event

  post:
    topic: post_event
    views:
      topic: post_views_event

  like:
    topic: like_event

  feed:
    heat-tasks:
      topic: feed-heat-tasks
    heat-progress:
      topic: feed-heat-progress

feed:
  max-size: 500
  comment:
    max-size: 3

heat:
  batch-size: 100
  threads-per-instance: 5