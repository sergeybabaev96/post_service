spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel
          post-channel:
            name: post_channel_topic

    kafka:
      bootstrap-servers: localhost:9092
      producer:
        key-serializer: org.apache.kafka.common.serialization.StringSerializer
        value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
        properties:
          spring.json.add.type.headers: false
      topic:
        post:
          name: posts
          partitions: 10
          replicas: 1
      admin:
        properties:
          retries: 5
          retry.backoff.ms: 1000

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 50MB

server:
  port: 8081

logging:
  level:
    root: info

kafka:
  bootstrap-servers: localhost:9092
  consumer:
    trusted-packages: faang.school.postservice.event

post:
  ad-remover:
    scheduler:
      cron: "0 0 0 * * ?"
    max-list-size: 50

feed:
  max-size: 500

services:
  s3:
    endpoint: http://127.0.0.1:9000
    accessKey: user
    secretKey: password
    bucketName: corpbucket
    max-image-size-mb: 5
    max-images-count-for-post: 10
    image:
      max-width-horizontal: 1080
      max-height-horizontal: 566
      max-side-square: 1080

user-service:
  host: localhost
  port: 8080

project-service:
  host: localhost
  port: 8082

payment-service:
  host: localhost
  port: 9080

post-service:
  thread-pool-size: 5

spell-service:
  url: https://speller.yandex.net/services/spellservice.json
  cron: "0 0 1 * * *"
  retry:
    attempts: 3
    delay: 1
    multiplier: 1

moderation:
  cron: "0 0 0 * * ?"
  batch-size: 100
  bad-words-file-path: DirtyWords.json