app:
  hashtags:
    max-cached-posts-per-hashtag: 100
    thread-pool-size: 8
    top-hashtags-cache: 1000

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel
  retry:
    language-tool:
      max-attempts: 4
      backoff-delay: 500

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      retries: 5
      acks: all
      linger-ms: 5
      batch-size: 16384
      max-in-flight-requests-per-connection: 10
      topics:
        user-ban: "user-ban-topic"
        post:
          achievement:
            post-event-topic: "post-topic"
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "faang.school.postservice.dto"

server:
  port: 8081

logging:
  level:
    root: info

services:
  user-service:
    host: localhost
    port: 8080
  project-service:
    host: localhost
    port: 8082
  payment-service:
    host: localhost
    port: 9080
  comment-analyzer:
    endpoint: https://commentanalyzer.googleapis.com/v1alpha1
    api-key: "AIzaSyDNS2DzSDuUQI_FLdY4dSmA5Bgj397kwK8"
    path: "/comments:analyze"

moderation:
  comments:
    cron: "0 0 * * * *"
    batch-size: 250000
    max-attempts: 3
    backoff-delay: 1000
    timeout-hours: 5
    thread-pool-size: 16
    ban-threshold: 5

  language-tool:
    base-url: https://api.languagetool.org/v2

posts:
  correction:
    cron: "0 5 * * * *"
    batch-size: 100000
    thread-poop-size: 16
