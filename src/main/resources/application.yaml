spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/postgres
    username: user
    password: password

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    redis:
      port: 6379
      host: localhost
      channels:
        calculations_channel:
          name: calculations_channel

  kafka:
    bootstrap-servers: localhost:29092
    producer:
      acks: all
      retries: 10
      properties:
        delivery.timeout.ms: 120000
        linger.ms: 5
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      enable-auto-commit: false
      group-id: feed
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "faang.school.postservice.model.event"

server:
  port: 8081

logging:
  level:
    root: info

feign:
  client:
    config:
      default:
        connectTimeout: 15000
        readTimeout: 15000
        loggerLevel: BASIC
domain:
  base-path: /api/v1

post-service:
  kafka:
    post-topic: posts
    post-view-topic: post_views
    like-topic: likes
    partitions: 3
  cache:
    post-ttl: 1d
    author-ttl: 1d
    feed-ttl: 1d
    cache-feed-size: 500
  ai:
    grammar-prompt: "Проверь текст на орфографию, если есть ошибка или ошибки верни только исправленный текст."
    api-key: ${GPT_API_KEY}
    base-url: "https://api.openai.com"
    chat-uri: "/v1/chat/"
    model: "gpt-4o-mini"
  jobs:
    post-corrector:
      cron: 0 0 12 * * *
      batch-count: 100
user-service:
  url: localhost:8080/api/v1
project-service:
  url: localhost:8082/api/v1
payment-service:
  url: localhost:9080