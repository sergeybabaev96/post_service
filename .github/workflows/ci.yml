name: Post Service CI Pipeline

on:
  pull_request:
    branches:
      - murloc-master-stream9

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Verify dependencies
        run: ./gradlew dependencies --no-daemon --refresh-dependencies

      - name: Build project
        run: ./gradlew clean build --no-daemon --stacktrace

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification --no-daemon --stacktrace

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test

      - name: Upload Built JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: service-jar
          path: build/libs/service.jar